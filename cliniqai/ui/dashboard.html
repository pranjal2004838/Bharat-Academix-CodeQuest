<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CliniqAI — Epidemic Dashboard</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;700;900&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Leaflet CSS & JS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <style>
    body {
      background: #0B0C10;
      color: #fff;
      font-family: 'Inter', sans-serif;
      margin: 0;
      overflow-x: hidden;
    }
    
    .heading-font { font-family: 'Space Grotesk', sans-serif; }

    #map {
      height: 70vh;
      width: 100%;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.1);
      z-index: 10;
    }

    .leaflet-container {
      background: #0B0C10;
    }

    /* Red Alert Header */
    .header-alert {
      background: rgba(11, 12, 16, 0.8);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(255,255,255,0.05);
      padding: 1.5rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
  </style>
</head>
<body>

  <header class="header-alert">
    <div>
      <h1 class="text-2xl font-black heading-font tracking-tight">Public Health Surveillance</h1>
      <div class="text-sm text-gray-400">Real-time disease outbreak tracking across CliniqAI network</div>
    </div>
    
    <div class="text-right">
      <div class="text-emerald-400 font-bold tracking-widest text-xs uppercase flex items-center gap-2 justify-end">
        <span class="w-2 h-2 bg-emerald-500 rounded-full animate-pulse"></span>
        SYSTEM LIVE
      </div>
      <div class="text-sm font-medium mt-1" id="total-cases">Loading Data...</div>
    </div>
  </header>

  <main class="p-6 max-w-7xl mx-auto">
    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
      
      <!-- Left Panel: Stats -->
      <div class="bg-white/5 border border-white/10 rounded-xl p-6">
        <h2 class="text-xl font-bold mb-6 heading-font">Recent Clusters</h2>
        <div id="cluster-list" class="space-y-4">
          <div class="animate-pulse flex space-x-4">
            <div class="flex-1 space-y-4 py-1">
              <div class="h-2 bg-white/20 rounded"></div>
              <div class="space-y-3">
                <div class="grid grid-cols-3 gap-4">
                  <div class="h-2 bg-white/20 rounded col-span-2"></div>
                  <div class="h-2 bg-white/20 rounded col-span-1"></div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- Right Panel: Map -->
      <div class="lg:col-span-2">
        <div id="map"></div>
      </div>
      
    </div>
  </main>

  <!-- Floating Back Button -->
  <a href="landing.html" class="fixed bottom-8 left-8 w-12 h-12 bg-white/5 backdrop-blur border border-white/10 rounded-full flex items-center justify-center hover:bg-white/10 transition z-50">
    <svg width="24" height="24" fill="none" viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
  </a>

  <script>
    // Initialize map centered on India
    const map = L.map('map').setView([20.5937, 78.9629], 5);

    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
      attribution: '&copy; OpenStreetMap &copy; CARTO',
      subdomains: 'abcd',
      maxZoom: 20
    }).addTo(map);

    async function loadEpidemicData() {
      try {
        const response = await fetch('/api/epidemic-data');
        const data = await response.json();
        
        let total = 0;
        const clusterList = document.getElementById('cluster-list');
        clusterList.innerHTML = '';

        data.clusters.forEach(cluster => {
          total += cluster.count;

          // Draw circle on map
          L.circleMarker([cluster.lat, cluster.lng], {
            color: cluster.count > 5 ? '#DC2626' : '#F59E0B',
            fillColor: cluster.count > 5 ? '#DC2626' : '#F59E0B',
            fillOpacity: 0.6,
            radius: Math.max(10, cluster.count * 3) // Scale radius by cases
          }).addTo(map)
            .bindPopup(`<b>${cluster.disease}</b><br>${cluster.location}<br>Cases: ${cluster.count}`);

          // Add to list
          clusterList.innerHTML += `
            <div class="p-4 bg-black/40 rounded border border-white/5">
              <div class="text-xs text-gray-500 uppercase">${cluster.location}</div>
              <div class="text-lg font-bold ${cluster.count > 5 ? 'text-red-400' : 'text-amber-400'}">${cluster.disease}</div>
              <div class="text-sm">Active Cases: ${cluster.count}</div>
            </div>
          `;
        });

        document.getElementById('total-cases').innerText = `${total} Aggregated Records`;

      } catch(e) {
        console.error("Failed to load map data", e);
      }
    }

    loadEpidemicData();
  </script>
</body>
</html>
